version: '3.8'

services:
  web:
    build: .
    command: gunicorn companyapi.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - ./companyapi:/app
    ports:
      - "8000:8000"
    env_file:
      - ./companyapi/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=db
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - db
      - redis
      - qdrant

  celery:
    build: .
    command: celery -A companyapi worker -l INFO
    volumes:
      - ./companyapi:/app
    env_file:
      - ./companyapi/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DB_HOST=db
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - db
      - redis
      - qdrant

  db:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=companyapi
      - MYSQL_USER=fmcsa_user
      - MYSQL_PASSWORD=fmcsa_pass
      - MYSQL_ROOT_PASSWORD=root_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  qdrant_data:
