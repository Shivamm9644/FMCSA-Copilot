<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FMCSA CSV Upload</title>
    <!-- Bootstrap for premium look -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoH8YkXkYh5ZfXg5E5y8u5V6y8+2tL8cVh0K6U6Z7Rk8zV5" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Inter", sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .result {
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="mb-4 text-center">Upload FMCSA CSV File</h3>
                {% if error %}
                    <div class="alert alert-danger" role="alert">{{ error }}</div>
                {% endif %}
                {% if message %}
                    <div class="alert alert-success" role="alert">{{ message }}</div>
                {% endif %}
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input class="form-control" type="file" name="file" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Upload</button>
                </form>
                {% if file_id %}
                    <div class="result mt-3">
                        <p><strong>File ID:</strong> {{ file_id }}</p>
                        <p><strong>Task ID (background processing):</strong> {{ task_id }}</p>
                        <p>Check the dashboard to see validation results once processing finishes.</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+4hZ4f5B0Y6Y5Z8V3p6l9nR8N6J8e" crossorigin="anonymous"></script>
</body>
</html>
